# docker-compose for local development of the CustomerSupport frontend.
#
# The AgentCore runtime is NOT run here — it is deployed to AWS via:
#   agentcore deploy  (or  agentcore dev  for local testing with live AWS resources)
#
# Usage:
#   cp app/CustomerSupport/frontend/.env.local.example app/CustomerSupport/frontend/.env
#   # edit .env with your values
#   docker compose up --build

services:
  frontend:
    build:
      context: ./app/CustomerSupport
      dockerfile: frontend/Dockerfile
    image: customersupport-frontend:local
    container_name: cs-frontend
    ports:
      - "8501:8501"
    env_file:
      - ./app/CustomerSupport/frontend/.env      # local overrides (git-ignored)
    environment:
      HOST: "0.0.0.0"
      PORT: "8501"
      DEBUG: "false"
      HTTPS_ONLY: "false"
      # Inject runtime ARN directly so the container doesn't need the state file
      RUNTIME_ARN: "${RUNTIME_ARN:-}"
    volumes:
      # Mount the whole .cli dir (single-file mounts are unreliable on Docker Desktop/macOS)
      - ./agentcore/.cli:/agentcore/.cli:ro
      # Mount source for hot-reload during development (comment out for prod)
      - ./app/CustomerSupport/frontend:/app/frontend:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
